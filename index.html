  <script>

        extend: {
          fontFamily: {

          },

            edenred: {

              light: '#fce7e8',

            dataclub: {

  <style>
    body { 
      font-family: 'Ubuntu', sans-serif; 
      background-image: url('https://www.edenred.cz/static/images/ER-banner-bg-601.png');
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      overflow-x: hidden;
    }

    .border-gradient-dc {
      border: 2px solid transparent;
      background: linear-gradient(white, white) padding-box,
                  linear-gradient(to right, #ff8a00, #00d1ff, #ff00e5) border-box;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    .bg-overlay {
      background-color: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
    }

    .lens-flare {
      position: absolute;
      top: -150px;
      left: -150px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 60%);
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 20;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #E3000F44;
      border-radius: 10px;
    }

    /* Animace šipky */
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
    .path-draw {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: draw 2s ease-out forwards;
    }
  </style>
</head>

    function createPersonCard(person, isFeatured = false) {
      const branding = person.branding;
      const isMagdalena = person.name === "Magdaléna Vacková";
      
      let avatarUrl = person.imageUrl;
      if (!avatarUrl) {
        let bg = 'fce7e8';
        let color = 'E3000F';
        
        if (branding === 'dataclub') {
          bg = '13005a';
          color = 'ffffff';
        } else if (branding === 'contexto') {
          bg = '24a19c';
          color = 'ffffff';
        } else if (isFeatured) {
          bg = 'E3000F';
          color = 'ffffff';
        }
        avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(person.name)}&background=${bg}&color=${color}&bold=true&size=128`;
      }
      
      const hasLinkedin = person.linkedin && person.linkedin !== "#";
      
      let linkColors = "";
      if (branding === 'dataclub') {
        linkColors = "text-dataclub-navy hover:text-dataclub-cyan";
      } else if (branding === 'contexto') {
        linkColors = "text-contexto-dark hover:text-contexto";
      } else {
        linkColors = "text-edenred hover:text-edenred-dark";
      }
      
      let cardClasses = isFeatured ? "w-80 p-6 " : "w-64 p-4 ";
      cardClasses += "bg-white rounded-2xl transition-all duration-300 group relative z-10 flex flex-col mx-auto h-fit ";
      
      if (branding === 'dataclub') {
        cardClasses += isFeatured ? "border-gradient-dc shadow-dataclub" : "border border-dataclub-navy/10 shadow-sm hover:border-dataclub-cyan/50 hover:shadow-md";
      } else if (branding === 'contexto') {
        cardClasses += isFeatured ? "border-2 border-contexto shadow-contexto" : "border border-contexto/20 shadow-sm hover:border-contexto hover:shadow-md";
      } else {
        cardClasses += isFeatured ? "border-2 border-edenred shadow-edenred" : "border border-gray-100 shadow-sm hover:border-edenred/40 hover:shadow-md";
      }

      let roleClasses = "text-[10px] font-bold uppercase tracking-widest leading-none mb-1.5 truncate ";
      if (branding === 'dataclub') roleClasses += "text-dataclub-navy";
      else if (branding === 'contexto') roleClasses += "text-contexto-dark";
      else roleClasses += "text-edenred";

      let avatarSize = isFeatured ? "w-14 h-14" : "w-12 h-12";

      // HTML pro poznámku a šipku pod kartou Magdalény
      const annotationHTML = isMagdalena ? `
        <div class="absolute left-1/2 -translate-x-1/2 -bottom-24 z-50 pointer-events-none hidden lg:block">
           <svg class="w-20 h-16 text-edenred overflow-visible mx-auto" viewBox="0 0 100 100">
             <!-- Hlavní křivka -->
             <path class="path-draw" d="M 50 85 Q 75 55, 50 5" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
             <!-- Vylepšený hrot šipky navazující na tangentu křivky -->
             <path class="path-draw" d="M 40 18 C 42 12, 46 8, 50 5 C 54 8, 58 12, 60 18" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
           </svg>
           <div class="w-72 font-handwriting text-3xl text-edenred text-center mt-[-8px] whitespace-nowrap rotate-[-2deg]">
             10 let zkušeností v HR!
           </div>
        </div>
      ` : '';

      return `
        <div class="relative ${isMagdalena ? 'magdalena-wrapper' : ''}">
          <div class="${cardClasses}">
            <div class="flex items-center gap-4 w-full text-left">
              <div class="flex-shrink-0 relative">
