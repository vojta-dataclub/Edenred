<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Struktura Týmu - Edenred, Data Club & Contexto</title>
  <!-- Načtení Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Načtení fontů -->
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Ubuntu', 'sans-serif'],
            ubuntu: ['Ubuntu', 'sans-serif'],
            handwriting: ['Caveat', 'cursive'],
          },
          colors: {
            edenred: {
              DEFAULT: '#E3000F',
              dark: '#b3000c',
              light: '#fce7e8',
            },
            dataclub: {
              navy: '#13005a', 
              cyan: '#00d1ff',
              magenta: '#ff00e5',
              orange: '#ff8a00'
            },
            contexto: {
              DEFAULT: '#24a19c', 
              dark: '#1b7d79',
              light: '#e9f6f5'
            }
          },
          boxShadow: {
            'edenred': '0 4px 14px 0 rgba(227, 0, 15, 0.15)',
            'dataclub': '0 4px 14px 0 rgba(19, 0, 90, 0.15)',
            'contexto': '0 4px 14px 0 rgba(36, 161, 156, 0.15)',
          }
        }
      }
    }
  </script>
  <style>
    body { 
      font-family: 'Ubuntu', sans-serif; 
      background-image: url('https://www.edenred.cz/static/images/ER-banner-bg-601.png');
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      overflow-x: hidden;
    }

    .border-gradient-dc {
      border: 2px solid transparent;
      background: linear-gradient(white, white) padding-box,
                  linear-gradient(to right, #ff8a00, #00d1ff, #ff00e5) border-box;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    .bg-overlay {
      background-color: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
    }

    .lens-flare {
      position: absolute;
      top: -150px;
      left: -150px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 60%);
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 20;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #E3000F44;
      border-radius: 10px;
    }

    /* Animace šipky */
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
    .path-draw {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: draw 2s ease-out forwards;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8 text-center">

  <!-- Hlavní kontejner -->
  <div id="app" class="w-full max-w-[1540px] bg-overlay rounded-[3rem] shadow-2xl relative overflow-hidden flex flex-col min-h-[90vh] border-4 border-white/50 z-10">
    
    <div class="lens-flare"></div>

    <!-- Horní Edenred lišta -->
    <div class="h-2 bg-edenred w-full"></div>

    <!-- Obsah -->
    <div class="flex-1 flex flex-col p-6 md:p-12 relative z-30 overflow-y-auto">
      
      <!-- Hlavička -->
      <div class="flex flex-col md:flex-row justify-between items-center md:items-start mb-12 gap-6">
        <div class="text-center md:text-left">

            Realizační tým pro marketingové služby <br>
            <span class="text-gray-800 text-xl font-medium normal-case opacity-80">se zaměřením na Leadgen</span>
          </h1>
        </div>

        <!-- Logo Edenred s přímým odkazem (bez hover efektů) -->
        <a href="https://www.edenred.cz/" target="_blank" class="relative z-30 cursor-pointer flex flex-col items-center justify-center p-2">
           <img src="https://www.edenred.cz/static/images/edenred_logo.svg" alt="Edenred Logo" class="h-12 w-auto">
        </a>
      </div>

      <!-- Organizační diagram -->
      <div id="org-chart" class="flex-1 flex flex-col items-center w-full">
        <!-- Renderováno pomocí JS -->
      </div>

      <!-- Claim dole uprostřed -->
      <div class="mt-20 text-center w-full">
        <span class="font-ubuntu text-sm font-bold text-gray-500 uppercase tracking-widest block">
          Power up your <span class="text-edenred">joie de vivre</span>
        </span>
      </div>
    </div>

    <!-- Footer -->
    <div class="px-6 md:px-12 py-6 bg-edenred/5 border-t border-edenred/10 flex flex-col md:flex-row justify-between items-center gap-4 text-sm text-gray-600 relative z-30">
      <span class="font-ubuntu font-bold tracking-wide uppercase text-[10px]">Data Club© 2026 | Edenred Team Structure</span>
      <img src="https://vojta-dataclub.github.io/Edenred/images/nodatanofun-15.png" alt="No Data No Fun" class="h-10 md:h-12 w-auto object-contain opacity-80 hover:opacity-100 transition-opacity">
    </div>
  </div>

          imageUrl: "https://media.licdn.com/dms/image/v2/C4E03AQFhu5dCFMS59g/profile-displayphoto-shrink_200_200/profile-displayphoto-shrink_200_200/0/1621351777679?e=1777507200&v=beta&t=lLz7470NxZAbSgwA3zUlU6tGlVTA5xJLtPQuueU78XE",
          linkedin: "https://www.linkedin.com/in/tomáš-vacek-aa22aa4a/",

          expertise: "Tomáš Vacek je zkušený manažer a stratég s více než 25 lety praxe v oblasti obchodu, marketingu, online marketingu, salesu a business developmentu. Významnou část své kariéry spojil s agenturním prostředím, kde působil ve vedení Ogilvy Action i Ogilvy & Mather jako Managing Director a věnoval se řízení agentury, rozvoji byznysu, strategii i vedení klíčových klientů. Vedle toho má silné zkušenosti i z byznysového a korporátního prostředí, mimo jiné jako General Manager ve skupině Perfect Group nebo jako Vice-Chairman of the Board a CEO ve společnosti Pietro Filipi Holding. V CONTEXTU dnes působí jako zakládající partner se zaměřením na sales, marketing, online marketing a strategii, kde pomáhá firmám hledat nové cesty k růstu a rozvoji. Jeho profesní dráha propojuje vrcholový management, strategické řízení, obchodní rozvoj i hlubokou znalost marketingového prostředí."

      },

        linkedin: "https://www.linkedin.com/in/xtina/",

        expertise: "Má více než 20 let zkušeností v marketingu, reklamě a brand managementu, které získala v agenturním i klientském prostředí. Působila v TBWA a Ogilvy, kde se postupně vypracovala až na pozici Account Directora a získala silné zkušenosti s vedením klientů, kampaní i značek. Na straně klienta pak jako Brand Manager ALBERT v Aholdu zodpovídala za brandovou strategii, marketingový kalendář, práci s rozpočtem i implementaci brand guidelines. Dnes v CONTEXTU působí jako seniorní konzultant a zakládající partner, kde využívá své dlouholeté zkušenosti z marketingu a reklamy při vedení klientských vztahů, rozvoji značek a strategickém poradenství. Její profesní dráha propojuje strategické myšlení, praxi z předních reklamních agentur a hlubokou znalost budování značek."
      },

        },

    };

    function createPersonCard(person, isFeatured = false) {
      const branding = person.branding;
      const isMagdalena = person.name === "Magdaléna Vacková";
      
      let avatarUrl = person.imageUrl;
      if (!avatarUrl) {
        let bg = 'fce7e8';
        let color = 'E3000F';
        
        if (branding === 'dataclub') {
          bg = '13005a';
          color = 'ffffff';
        } else if (branding === 'contexto') {
          bg = '24a19c';
          color = 'ffffff';
        } else if (isFeatured) {
          bg = 'E3000F';
          color = 'ffffff';
        }
        avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(person.name)}&background=${bg}&color=${color}&bold=true&size=128`;
      }
      
      const hasLinkedin = person.linkedin && person.linkedin !== "#";
      
      let linkColors = "";
      if (branding === 'dataclub') {
        linkColors = "text-dataclub-navy hover:text-dataclub-cyan";
      } else if (branding === 'contexto') {
        linkColors = "text-contexto-dark hover:text-contexto";
      } else {
        linkColors = "text-edenred hover:text-edenred-dark";
      }
      
      let cardClasses = isFeatured ? "w-80 p-6 " : "w-64 p-4 ";
      cardClasses += "bg-white rounded-2xl transition-all duration-300 group relative z-10 flex flex-col mx-auto h-fit ";
      
      if (branding === 'dataclub') {
        cardClasses += isFeatured ? "border-gradient-dc shadow-dataclub" : "border border-dataclub-navy/10 shadow-sm hover:border-dataclub-cyan/50 hover:shadow-md";
      } else if (branding === 'contexto') {
        cardClasses += isFeatured ? "border-2 border-contexto shadow-contexto" : "border border-contexto/20 shadow-sm hover:border-contexto hover:shadow-md";
      } else {
        cardClasses += isFeatured ? "border-2 border-edenred shadow-edenred" : "border border-gray-100 shadow-sm hover:border-edenred/40 hover:shadow-md";
      }

      let roleClasses = "text-[10px] font-bold uppercase tracking-widest leading-none mb-1.5 truncate ";
      if (branding === 'dataclub') roleClasses += "text-dataclub-navy";
      else if (branding === 'contexto') roleClasses += "text-contexto-dark";
      else roleClasses += "text-edenred";

      let avatarSize = isFeatured ? "w-14 h-14" : "w-12 h-12";

      // HTML pro poznámku a šipku pod kartou Magdalény
      const annotationHTML = isMagdalena ? `
        <div class="absolute left-1/2 -translate-x-1/2 -bottom-24 z-50 pointer-events-none hidden lg:block">
           <svg class="w-20 h-16 text-edenred overflow-visible mx-auto" viewBox="0 0 100 100">
             <!-- Hlavní křivka -->
             <path class="path-draw" d="M 50 85 Q 75 55, 50 5" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
             <!-- Vylepšený hrot šipky navazující na tangentu křivky -->
             <path class="path-draw" d="M 40 18 C 42 12, 46 8, 50 5 C 54 8, 58 12, 60 18" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
           </svg>
           <div class="w-72 font-handwriting text-3xl text-edenred text-center mt-[-8px] whitespace-nowrap rotate-[-2deg]">
             10 let zkušeností v HR!
           </div>
        </div>
      ` : '';

      return `
        <div class="relative ${isMagdalena ? 'magdalena-wrapper' : ''}">
          <div class="${cardClasses}">
            <div class="flex items-center gap-4 w-full text-left">
              <div class="flex-shrink-0 relative">
                <img src="${avatarUrl}" alt="${person.name}" class="${avatarSize} rounded-full object-cover border-2 border-transparent group-hover:scale-110 transition-all shadow-sm" />
              </div>

              <div class="flex flex-col min-w-0 flex-1">
                <span class="${roleClasses}">
                  ${person.role}
                </span>
                <span class="font-bold text-gray-800 text-xs md:text-sm truncate group-hover:text-edenred transition-colors">
                  ${person.name}
                </span>
                ${hasLinkedin ? `
                  <a href="${person.linkedin}" target="_blank" class="text-[9px] font-bold underline decoration-dotted transition-colors ${linkColors}">
                    LinkedIn profil
                  </a>
                ` : ''}
              </div>
            </div>
            
            <details class="mt-4 border-t border-gray-100 pt-3 cursor-pointer group/details overflow-hidden text-left">
              <summary class="text-[9px] font-bold text-gray-400 uppercase tracking-widest flex items-center justify-between list-none hover:text-edenred transition-colors">
                Seniorita & Expertise
                <svg class="w-3.5 h-3.5 transition-transform duration-300 group-open/details:rotate-180" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </summary>
              <div class="text-[9px] text-gray-500 mt-2.5 leading-relaxed font-medium bg-gray-50/50 p-2 rounded-lg">
                ${person.expertise}
              </div>
            </details>
          </div>
          ${annotationHTML}
        </div>
      `;
    }

    const container = document.getElementById('org-chart');

    container.innerHTML = `
      <!-- Úroveň 1: Head (Vojta, Mikuláš & Tomáš) -->
      <div class="flex flex-col items-center w-full mb-4 lg:mb-28">
        <div class="flex flex-col lg:flex-row items-center lg:items-start justify-center gap-6 lg:gap-10 relative w-full">
          <!-- Krásné propojení s křivkou v barvách divizí (desktop) -->
          <!-- Křivka k Vojtovi (Data Club) -->
          <div class="hidden lg:block absolute top-[25%] left-[calc(50%-360px)] w-[360px] h-[65%] border-t-[3px] border-l-[3px] border-dashed border-dataclub-navy/40 rounded-tl-[3rem] z-0"></div>
          
          <!-- Křivka k Tomášovi (Contexto) -->
          <div class="hidden lg:block absolute top-[25%] right-[calc(50%-360px)] w-[360px] h-[65%] border-t-[3px] border-r-[3px] border-dashed border-contexto/40 rounded-tr-[3rem] z-0"></div>
          
          <!-- Karta Vojta -->
          <div class="z-10 lg:translate-y-[50%] transition-transform">${createPersonCard(orgData.head, true)}</div>
          
          <!-- Plná čára (mobile) -->
          <div class="block lg:hidden h-8 border-l-[3px] border-gray-300 z-0"></div>
          
          <!-- Karta Mikuláš (Uprostřed) -->
          <div class="z-10">${createPersonCard(orgData.headMiddle, true)}</div>

          <!-- Plná čára (mobile) -->
          <div class="block lg:hidden h-8 border-l-[3px] border-gray-300 z-0"></div>
          
          <!-- Karta Tomáš -->
          <div class="z-10 lg:translate-y-[50%] transition-transform">${createPersonCard(orgData.head2, true)}</div>
        </div>
        <div class="w-[3px] h-10 bg-gray-300 mt-4 lg:mt-16 z-0"></div>
      </div>

      <!-- Úroveň 2: Strategie -->
      <div class="relative w-full mb-8 lg:mb-16">
        <!-- Horní propojovací čára - přesně spojuje centra Moniky a Natálie (nyní plná) -->
        <div class="absolute top-0 left-[32.5%] right-[32.5%] h-[3px] border-t-[3px] border-gray-300 hidden lg:block z-0"></div>
        
        <div class="flex flex-col lg:flex-row justify-between w-full items-center lg:items-start gap-8 lg:gap-0">
          
          <!-- Levá část: Monika (Data Club) -->
          <div class="flex-1 flex flex-col items-center w-full relative">
            
            <!-- Posunuto o 15% doprava (blíž k centru) -->
            <div class="w-80 flex flex-col items-center relative z-10 lg:left-[15%]">
              <div class="w-[3px] h-6 bg-gray-300 hidden lg:block"></div>
              
              <div class="z-10 w-full relative">
                ${createPersonCard(orgData.strategyDataClub, true)}
              </div>
              
              <div class="w-[3px] h-6 bg-dataclub-navy hidden lg:block mt-2 opacity-60"></div>
            </div>
            
            <!-- Loket směřující přesně na střed spodního Data Club týmu -->
            <div class="hidden lg:block absolute top-[100%] right-[35%] w-[15%] h-8 border-t-[3px] border-l-[3px] border-dataclub-navy rounded-tl-[1.5rem] z-0 opacity-60"></div>
            <div class="hidden lg:block absolute top-[calc(100%+2rem)] left-[50%] w-[3px] h-6 bg-dataclub-navy z-0 opacity-60"></div>
          </div>
          
          <!-- Pravá část: Natálie & Kristina (Contexto) -->
          <div class="flex-1 flex flex-col items-center w-full relative">
            
            <!-- Posunuto o 15% doleva (blíž k centru) -->
            <div class="w-80 flex flex-col items-center relative z-10 lg:right-[15%]">
              <div class="w-[3px] h-6 bg-gray-300 hidden lg:block"></div>
              
              <div class="relative w-full">
                <!-- Propojovací křivka k Kristině (schovaná za kartou) -->
                <div class="hidden lg:block absolute top-[30%] left-[50%] w-[calc(100%+1.5rem)] h-[55%] border-t-[3px] border-r-[3px] border-dashed border-contexto/50 rounded-tr-[3rem] z-[-1]"></div>
                
                <!-- Natálie -->
                <div class="z-10 relative w-full">
                   ${createPersonCard(orgData.strategyContexto1, true)}
                </div>

                <!-- Kristina - navázaná přímo na šířku karty Natálie -->
                <div class="hidden lg:block absolute top-0 left-[calc(100%+1.5rem)] w-80 z-10 lg:translate-y-[50%] transition-transform">
                   ${createPersonCard(orgData.strategyContexto2, true)}
                </div>
              </div>

              <!-- Spodní spojnice k týmu -->
              <div class="w-[3px] h-6 bg-contexto hidden lg:block mt-2 opacity-60"></div>
            </div>

            <!-- Loket směřující přesně na střed spodního Contexto týmu -->
            <div class="hidden lg:block absolute top-[100%] left-[35%] w-[15%] h-8 border-t-[3px] border-r-[3px] border-contexto rounded-tr-[1.5rem] z-0 opacity-60"></div>
            <div class="hidden lg:block absolute top-[calc(100%+2rem)] right-[50%] w-[3px] h-6 bg-contexto z-0 opacity-60"></div>

            <!-- Mobilní zobrazení pro Kristinu (řazení pod sebou) -->
            <div class="flex lg:hidden flex-col items-center w-full mt-2">
                <div class="h-8 border-l-[3px] border-dashed border-contexto/40 z-0 mb-2"></div>
                ${createPersonCard(orgData.strategyContexto2, true)}
            </div>
          </div>
        </div>
      </div>

      <!-- Úroveň 3: Exekuce -->
      <div class="w-full flex flex-col lg:flex-row gap-8 px-4 mt-2">
        
        <!-- Data Club team -->
        <div class="flex-1 bg-white/40 rounded-[2.5rem] p-8 pb-6 border-2 border-dashed border-dataclub-navy/20 relative shadow-sm flex flex-col">
          <div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-white px-8 py-2 rounded-full border border-dataclub-navy/20 shadow-sm whitespace-nowrap z-20">
            <span class="text-[10px] font-bold text-dataclub-navy uppercase tracking-[0.2em]">Data Club Creative & Content team</span>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 justify-items-center mb-8">
            ${orgData.executionDataClub.map(person => createPersonCard(person, false)).join('')}
          </div>
          <div class="mt-auto flex justify-center items-center w-full pt-4 border-t border-dataclub-navy/10">
            <a href="https://www.dataclub.cz/" target="_blank" class="hover:scale-[1.15] transition-transform">
              <img src="https://vojta-dataclub.github.io/Edenred/images/dtc-logo-barva.png" alt="Data Club Logo" class="h-6 lg:h-8 object-contain scale-[1.10]">
            </a>
          </div>
        </div>

        <!-- Contexto team -->
        <div class="flex-1 bg-white/40 rounded-[2.5rem] p-8 pb-6 border-2 border-dashed border-contexto/30 relative shadow-sm flex flex-col">
          <div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-white px-8 py-2 rounded-full border border-contexto shadow-sm whitespace-nowrap z-20">
            <span class="text-[10px] font-bold text-contexto uppercase tracking-[0.2em]">Contexto Leadgen team</span>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 justify-items-center mb-8">
            ${orgData.executionContexto.map(person => createPersonCard(person, false)).join('')}
          </div>
          <div class="mt-auto flex justify-center items-center w-full pt-4 border-t border-contexto/20">
            <a href="https://www.contexto.cz/" target="_blank" class="hover:scale-105 transition-transform">
              <img src="https://vojta-dataclub.github.io/Edenred/images/Contexto.jpeg" alt="Contexto Logo" class="h-6 lg:h-8 object-contain mix-blend-multiply rounded-sm">
            </a>
          </div>
        </div>

      </div>
    `;
  </script>
